name: Deploy to Production

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env <<EOF
          DB_HOST=${{ secrets.DB_HOST || 'postgresql' }}
          DB_PORT=${{ secrets.DB_PORT || '5432' }}
          DB_NAME=${{ secrets.DB_NAME || 'hopenvision' }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          SUPER_ADMIN_EMAILS=${{ secrets.SUPER_ADMIN_EMAILS }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          CORS_ALLOWED_ORIGINS=https://study.unmong.com,https://admin.unmong.com,http://study.unmong.com:4060,http://study.unmong.com:4061
          TZ=Asia/Seoul
          EOF
          sed -i '' 's/^[[:space:]]*//' .env

      - name: Stop existing services
        run: |
          docker compose -f docker-compose.prod.yml down --timeout 30 || true

      - name: Build and start services
        run: |
          docker compose -f docker-compose.prod.yml build --no-cache
          docker compose -f docker-compose.prod.yml up -d

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 10

          echo "Checking user frontend..."
          curl -f -s -o /dev/null --retry 5 --retry-delay 5 --retry-all-errors http://localhost:4060
          echo "User frontend OK"

          echo "Checking admin frontend..."
          curl -f -s -o /dev/null --retry 5 --retry-delay 5 --retry-all-errors http://localhost:4061
          echo "Admin frontend OK"

          echo "Checking backend (waiting for Spring Boot startup)..."
          for i in $(seq 1 20); do
            if curl -f -s -o /dev/null "http://localhost:9050/api/exams?page=0&size=1" 2>/dev/null; then
              echo "Backend OK (attempt $i)"
              break
            fi
            if [ $i -eq 20 ]; then
              echo "Backend health check failed after 20 attempts"
              echo "=== Container status ==="
              docker ps -a --filter name=hopenvision-api --format "{{.Status}}"
              echo "=== Last 200 lines of backend logs ==="
              docker logs hopenvision-api --tail 200
              exit 1
            fi
            echo "Attempt $i: backend not ready, waiting 10s..."
            sleep 10
          done

          echo "All services are healthy."

      - name: Cleanup old Docker images
        run: |
          docker image prune -f
